version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: industrial_labs_db
    environment:
      POSTGRES_DB: industrial_labs
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
